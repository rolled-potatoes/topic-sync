services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.12
    container_name: krsync-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
      - --pandaproxy-addr
      - INTERNAL://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - INTERNAL://redpanda:8082
      - --schema-registry-addr
      - INTERNAL://0.0.0.0:8081
    ports:
      - "19092:19092"
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: true'"]
      interval: 10s
      timeout: 5s
      retries: 20
